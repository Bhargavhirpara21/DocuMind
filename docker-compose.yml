services:
  api:
    build: .
    command: uvicorn src.api.routes:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  frontend:
    build: .
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DOCUMIND_API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./data:/app/data
